<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — Bond Therapy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3f6fc;
  --text: #0f1f3a;
  --muted: #67748d;
  --primary: #2b6cff;
  --primary-2: #5a8dff;
  --line: rgba(15,31,58,.08);
  --green: #16a34a;
  --red: #dc2626;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(160deg,#eef4ff,#dde8ff);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:20px;-webkit-font-smoothing:antialiased}
.card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(22,52,120,.12);border:1px solid var(--line)}
.card h1{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:6px}
.card .sub{color:var(--muted);font-size:.92rem;margin-bottom:24px}
.card label{display:block;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:14px}
.card input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:.95rem;outline:none;transition:border-color .15s,box-shadow .15s}
.card input:focus{border-color:rgba(43,108,255,.4);box-shadow:0 0 0 4px rgba(43,108,255,.08)}
.card button.primary{margin-top:20px;width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;font-size:.95rem;box-shadow:0 8px 22px rgba(43,108,255,.22)}
.card button.primary:hover{transform:translateY(-1px)}
.card button.primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{margin-top:14px;font-size:.9rem;padding:10px 12px;border-radius:10px;display:none}
.msg.err{background:#fee2e2;color:var(--red)}
.msg.ok{background:#dcfce7;color:var(--green)}
.back{display:inline-block;margin-top:18px;color:var(--primary);font-weight:600;font-size:.9rem}
.state{text-align:center;padding:10px 0}
</style>
</head>
<body>
<div class="card">
  <h1>Reset your password</h1>
  <p class="sub" id="subtitle">Choose a new password for your Bond Therapy account.</p>

  <div id="loading" class="state"><p class="sub">Checking link…</p></div>

  <form id="form" style="display:none">
    <label for="pw">New password</label>
    <input id="pw" type="password" minlength="6" required autocomplete="new-password" />
    <label for="pw2">Confirm new password</label>
    <input id="pw2" type="password" minlength="6" required autocomplete="new-password" />
    <button type="submit" class="primary" id="submit">Update password</button>
    <div id="msg" class="msg"></div>
  </form>

  <div id="invalid" class="state" style="display:none">
    <p class="sub" style="margin-bottom:10px">This reset link is invalid, expired, or hasn't been approved yet.</p>
    <a class="back" href="/">← Back to Bond Therapy</a>
  </div>

  <div id="done" class="state" style="display:none">
    <p class="sub" style="margin-bottom:10px">Your password has been updated. You can now sign in.</p>
    <a class="back" href="/">← Back to Bond Therapy</a>
  </div>
</div>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const $ = id => document.getElementById(id);

  async function check(){
    if (!token) { show('invalid'); return; }
    try {
      const r = await fetch('/api/clients/reset-password/check?token=' + encodeURIComponent(token));
      const d = await r.json();
      if (!d.valid) { show('invalid'); return; }
      $('subtitle').textContent = 'Resetting password for ' + d.email;
      show('form');
    } catch { show('invalid'); }
  }

  function show(which){
    ['loading','form','invalid','done'].forEach(id => $(id).style.display = (id === which) ? (which === 'form' ? 'block' : 'block') : 'none');
  }

  $('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = $('pw').value;
    const pw2 = $('pw2').value;
    const msg = $('msg');
    msg.style.display = 'none';
    if (pw.length < 6) { msg.className='msg err'; msg.textContent='Password must be at least 6 characters.'; msg.style.display='block'; return; }
    if (pw !== pw2)    { msg.className='msg err'; msg.textContent='Passwords do not match.'; msg.style.display='block'; return; }
    $('submit').disabled = true;
    try {
      const r = await fetch('/api/clients/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pw })
      });
      const d = await r.json();
      if (!r.ok) {
        msg.className='msg err';
        msg.textContent = d.error === 'password_too_short' ? 'Password must be at least 6 characters.' : 'This link is invalid or expired.';
        msg.style.display='block';
        $('submit').disabled = false;
        return;
      }
      show('done');
    } catch {
      msg.className='msg err';
      msg.textContent = 'Something went wrong. Please try again.';
      msg.style.display='block';
      $('submit').disabled = false;
    }
  });

  check();
})();
</script>
</body>
</html>
