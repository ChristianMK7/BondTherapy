<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bond Therapy — Therapist Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3f6fc;
  --text: #0f1f3a;
  --muted: #67748d;
  --primary: #2b6cff;
  --primary-2: #5a8dff;
  --line: rgba(15,31,58,.08);
  --green: #16a34a;
  --green-bg: #dcfce7;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --red: #dc2626;
  --red-bg: #fee2e2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font:inherit}

/* LOGIN */
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(160deg,#eef4ff,#dde8ff)}
.login-card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(22,52,120,.12);border:1px solid var(--line)}
.login-card h1{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:6px}
.login-card .sub{color:var(--muted);font-size:.92rem;margin-bottom:24px}
.login-card label{display:block;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:14px}
.login-card input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:.95rem;outline:none;transition:border-color .15s,box-shadow .15s}
.login-card input:focus{border-color:rgba(43,108,255,.4);box-shadow:0 0 0 4px rgba(43,108,255,.08)}
.login-card .err{color:var(--red);font-size:.86rem;margin-top:10px;display:none}
.login-card button.primary{margin-top:20px;width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;cursor:pointer;font-size:.95rem;box-shadow:0 8px 22px rgba(43,108,255,.22)}
.login-card button.primary:hover{transform:translateY(-1px)}
.login-card .links{text-align:center;margin-top:16px;font-size:.88rem;color:var(--muted)}
.login-card .links a{color:var(--primary);font-weight:600}

/* APP */
.app{display:none;max-width:1080px;margin:0 auto;padding:30px 24px 60px}
.app.show{display:block}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:14px}
.topbar .brand-row{display:flex;align-items:center;gap:14px}
.topbar h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700}
.topbar p{color:var(--muted);font-size:.9rem}
.brand-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:grid;place-items:center;box-shadow:0 6px 16px rgba(43,108,255,.22);flex:0 0 auto}
.brand-mark svg{width:20px;height:20px;color:#fff}
.btn{border:none;cursor:pointer;border-radius:11px;padding:9px 16px;font-weight:600;font-size:.88rem;transition:all .15s}
.btn-outline{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn-outline:hover{border-color:rgba(43,108,255,.3);color:var(--primary)}

.status-banner{padding:18px 22px;border-radius:14px;margin-bottom:24px;display:flex;align-items:center;gap:14px;border:1px solid}
.status-banner.pending{background:var(--amber-bg);border-color:#fde68a;color:#92400e}
.status-banner.approved{background:var(--green-bg);border-color:#bbf7d0;color:#166534}
.status-banner.declined{background:var(--red-bg);border-color:#fecaca;color:#991b1b}
.status-banner .icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.6);display:grid;place-items:center;flex:0 0 auto}
.status-banner h3{font-size:1rem;font-weight:700;margin-bottom:2px}
.status-banner p{font-size:.88rem;line-height:1.5}

.panel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(22,52,120,.04);margin-bottom:18px}
.panel-head{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
.panel-head h3{font-size:1.05rem;font-weight:700}
.panel-head .count{font-family:'DM Mono',monospace;color:var(--primary);background:rgba(43,108,255,.08);border-radius:999px;padding:4px 12px;font-size:.78rem;font-weight:700}

.booking{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}
.booking:last-child{border-bottom:none}
.booking .info strong{display:block;font-weight:700;margin-bottom:4px}
.booking .info .meta{font-size:.86rem;color:var(--muted)}
.booking .info .meta span+span::before{content:'•';margin:0 6px;color:var(--line)}
.booking .new-badge{background:var(--primary);color:#fff;font-size:.66rem;font-weight:700;border-radius:999px;padding:2px 8px;letter-spacing:.06em;margin-left:6px;text-transform:uppercase;font-family:'DM Mono',monospace}
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.empty h3{font-family:'Playfair Display',serif;color:var(--text);font-size:1.2rem;margin-bottom:6px}

.pill{display:inline-flex;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace}
.pill-amber{background:var(--amber-bg);color:var(--amber)}
.pill-green{background:var(--green-bg);color:var(--green)}
.pill-red{background:var(--red-bg);color:var(--red)}
.pill-blue{background:rgba(43,108,255,.1);color:var(--primary)}
.pill-gray{background:rgba(15,31,58,.07);color:var(--muted)}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>Therapist Portal</h1>
    <p class="sub">Sign in to track your application and view bookings.</p>
    <label>Email</label>
    <input type="email" id="loginEmail" autocomplete="email" />
    <label>Password</label>
    <input type="password" id="loginPass" autocomplete="current-password" />
    <div class="err" id="loginErr">Invalid email or password.</div>
    <button class="primary" onclick="doLogin()">Sign in</button>
    <div class="links">
      Not registered yet? <a href="/therapist">Submit your application</a>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="brand-row">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.8a5.5 5.5 0 0 0-7.8 0L12 5.8l-1-1a5.5 5.5 0 0 0-7.8 7.8L12 21l8.8-8.4a5.5 5.5 0 0 0 0-7.8Z"/></svg>
      </div>
      <div>
        <h1 id="welcomeName">Welcome</h1>
        <p id="welcomeRole">Therapist portal</p>
      </div>
    </div>
    <button class="btn btn-outline" onclick="doLogout()">Sign out</button>
  </div>

  <div id="statusBanner"></div>

  <div class="panel">
    <div class="panel-head">
      <h3>Upcoming bookings</h3>
      <span class="count" id="bookingsCount">0</span>
    </div>
    <div id="bookingsList"></div>
  </div>
</div>

<script>
async function init() {
  const me = await fetch('/api/therapists/me', { credentials:'include' }).then(r => r.json());
  if (me.loggedIn) showApp(me); else showLogin();
}
function showLogin() {
  document.getElementById('loginWrap').style.display = 'grid';
  document.getElementById('app').classList.remove('show');
}
async function showApp(me) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').classList.add('show');
  const fullName = `${me.title_prefix||''} ${me.first_name||''} ${me.last_name||''}`.trim();
  document.getElementById('welcomeName').textContent = `Welcome, ${me.first_name || 'Therapist'}`;
  document.getElementById('welcomeRole').textContent = `${me.specialty || 'Therapist'}${me.city ? ' • ' + me.city : ''}`;
  renderStatus(me.status);
  loadBookings();
}
function renderStatus(status) {
  const banner = document.getElementById('statusBanner');
  if (status === 'pending') {
    banner.innerHTML = `
      <div class="status-banner pending">
        <div class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 2"/></svg></div>
        <div>
          <h3>Application under review</h3>
          <p>Our admin team is reviewing your profile and credentials. You'll be listed publicly once approved. Bookings will appear here automatically.</p>
        </div>
      </div>`;
  } else if (status === 'approved') {
    banner.innerHTML = `
      <div class="status-banner approved">
        <div class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg></div>
        <div>
          <h3>Your profile is live</h3>
          <p>You're visible in the public directory. Bookings made through Bond Therapy will appear below.</p>
        </div>
      </div>`;
  } else if (status === 'declined') {
    banner.innerHTML = `
      <div class="status-banner declined">
        <div class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg></div>
        <div>
          <h3>Application not accepted</h3>
          <p>Unfortunately we were unable to approve your application at this time. Please contact us for more information.</p>
        </div>
      </div>`;
  }
}
async function loadBookings() {
  const rows = await fetch('/api/therapists/me/bookings', { credentials:'include' }).then(r => r.json());
  const list = document.getElementById('bookingsList');
  document.getElementById('bookingsCount').textContent = rows.length;
  if (!Array.isArray(rows) || !rows.length) {
    list.innerHTML = `<div class="empty"><h3>No bookings yet</h3><p>When a client books an appointment with you, it'll appear here.</p></div>`;
    return;
  }
  // anything created in last 24h shows a "New" badge
  const cutoff = Date.now() - 24*60*60*1000;
  list.innerHTML = rows.map(b => {
    const created = new Date((b.created_at || '').replace(' ', 'T') + 'Z').getTime();
    const isNew = !isNaN(created) && created > cutoff;
    const status = b.status || 'pending';
    const pillClass = status === 'cancelled' ? 'red' : status === 'confirmed' ? 'green' : 'amber';
    return `
      <div class="booking">
        <div class="info">
          <strong>${escapeHtml(b.client_first_name || '')} ${escapeHtml(b.client_last_name || '')}${isNew ? '<span class="new-badge">New</span>' : ''}</strong>
          <div class="meta">
            <span>${escapeHtml(b.appointment_date || '—')}</span>
            <span>${escapeHtml(b.time_slot || '—')}</span>
            <span>${escapeHtml(b.session_type || '—')}</span>
            <span>$${b.total || 0}</span>
          </div>
          <div class="meta" style="margin-top:6px">
            <span>${escapeHtml(b.client_email || '')}</span>
            ${b.client_phone ? `<span>${escapeHtml(b.client_phone)}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <span class="pill pill-${pillClass}">${status}</span>
          ${b.client_email ? `<a class="btn btn-outline" href="mailto:${escapeAttr(b.client_email)}?subject=Your%20appointment%20with%20Bond%20Therapy" target="_blank" rel="noopener">Contact</a>` : ''}
        </div>
      </div>`;
  }).join('');
}
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  const res = await fetch('/api/therapists/login', {
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email, password })
  });
  if (!res.ok) { err.style.display = 'block'; return; }
  init();
}
async function doLogout() {
  await fetch('/api/therapists/logout', { method:'POST', credentials:'include' });
  showLogin();
}
function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
init();
</script>
</body>
</html>
